<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Augmentiverse Cat AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR (Image Tracking) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Assets -->
    <a-assets>
      <!-- Your uploaded GLB -->
      <a-asset-item id="catModel" src="happy.glb"></a-asset-item>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="false"></a-camera>

    <!-- AR Target Anchor (Image Target Index 0) -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 3D Model anchored to printed cat image -->
      <!--<a-gltf-model
        src="#catModel"
        position="0 0 0.05"
        rotation="0 0 0"
        scale="0.25 0.25 0.25"
        animation-mixer>
      </a-gltf-model>-->

      <a-gltf-model
  id="catAugmentation"
  src="#anchoredModel"
  position="0 0 0.08"
  rotation="0 180 0"
  scale="0.25 0.25 0.25"
  animation-mixer
  animation__float="
    property: position;
    from: 0 0 0.08;
    to: 0 0.04 0.12;
    dur: 1800;
    dir: alternate;
    easing: easeInOutSine;
    loop: true">
</a-gltf-model>

    </a-entity>

  </a-scene>

</body>
</html>
